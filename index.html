<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>出納帳アプリ</title>
  <meta name="theme-color" content="#f6f3ee" />
  <link rel="manifest" href="./manifest.webmanifest" />
  <style>
    :root{--bg:#f6f3ee;--card:#fff;--ink:#222;--muted:#6f6a63;--line:#e5ded4;--accent:#4f7cff;--accent2:#2f6f55;--danger:#c74747;--warn:#a66a00;--shadow:0 8px 24px rgba(30,24,18,.08);--radius:18px}
    *{box-sizing:border-box} body{margin:0;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--bg);color:var(--ink);line-height:1.55;-webkit-tap-highlight-color:transparent}
    header{position:sticky;top:0;z-index:20;background:rgba(246,243,238,.92);backdrop-filter:blur(12px);border-bottom:1px solid var(--line);padding:14px 16px 10px}
    .top{display:flex;align-items:center;justify-content:space-between;gap:12px;max-width:980px;margin:0 auto} h1{font-size:20px;margin:0;font-weight:800;letter-spacing:.02em}
    .pill{display:inline-flex;align-items:center;gap:6px;padding:7px 10px;border:1px solid var(--line);border-radius:999px;background:#fff;color:var(--muted);font-size:12px;white-space:nowrap}
    main{max-width:980px;margin:0 auto;padding:14px 14px 94px}.grid{display:grid;grid-template-columns:1fr;gap:12px}@media (min-width:820px){.grid{grid-template-columns:1fr 1fr}.wide{grid-column:1/-1}}
    .card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:14px}.card h2{margin:0 0 10px;font-size:16px;display:flex;justify-content:space-between;align-items:center;gap:8px}
    .summary{display:grid;grid-template-columns:1fr 1fr;gap:10px}.metric{padding:12px;border-radius:16px;border:1px solid var(--line);background:#fbfaf8}.metric .label{font-size:12px;color:var(--muted)}.metric .value{font-size:21px;font-weight:800;margin-top:3px}.value.minus{color:var(--danger)}.value.plus{color:var(--accent2)}
    button,input,select,textarea{font:inherit} input,select,textarea{width:100%;border:1px solid var(--line);background:#fff;color:var(--ink);border-radius:13px;padding:10px 11px;outline:none} input:focus,select:focus,textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(79,124,255,.12)} label{display:block;font-size:12px;color:var(--muted);margin:9px 0 5px}
    .row{display:grid;grid-template-columns:1fr 1fr;gap:10px}.actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px} button{border:0;border-radius:14px;padding:10px 12px;background:var(--accent);color:#fff;font-weight:700;cursor:pointer;min-height:42px} button.secondary{background:#eee8df;color:#2b2824} button.green{background:var(--accent2)} button.danger{background:var(--danger)} button.ghost{background:transparent;color:var(--muted);border:1px solid var(--line)} button.small{font-size:12px;padding:7px 9px;min-height:34px;border-radius:12px} button:active{transform:translateY(1px)}
    .medium-list{display:grid;gap:8px}.medium-item{display:flex;align-items:center;justify-content:space-between;gap:10px;border:1px solid var(--line);border-radius:16px;padding:10px;background:#fbfaf8}.medium-left{display:flex;align-items:center;gap:10px;min-width:0}.dot{width:14px;height:14px;border-radius:50%;background:var(--accent);flex:0 0 auto}.name{font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.sub{font-size:12px;color:var(--muted)}.yen{font-weight:850;font-size:16px;white-space:nowrap}
    .tabs{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}.tab{background:#eee8df;color:#2b2824;border:1px solid var(--line)}.tab.active{background:var(--accent);color:#fff;border-color:transparent}
    .quick-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-top:8px}@media (min-width:520px){.quick-grid{grid-template-columns:repeat(4,1fr)}}.quick{padding:10px;border:1px solid var(--line);border-radius:14px;background:#fbfaf8;text-align:left;color:var(--ink);min-height:70px}.quick.selected{outline:3px solid rgba(79,124,255,.18);border-color:var(--accent)}.quick .qname{font-weight:800}.quick .qbal{font-size:12px;color:var(--muted)}
    .history{display:grid;gap:8px;max-height:520px;overflow:auto;padding-right:2px}.tx{border:1px solid var(--line);border-radius:16px;padding:10px;background:#fbfaf8;display:grid;gap:6px}.tx-top{display:flex;justify-content:space-between;gap:10px}.tx-title{font-weight:800}.tx-meta{font-size:12px;color:var(--muted)}.tx-amount{font-weight:850;white-space:nowrap}.tx-amount.expense{color:var(--danger)}.tx-amount.income{color:var(--accent2)}.tx-amount.transfer{color:var(--warn)}
    .filters{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}.bar-wrap{display:grid;gap:8px}.bar-row{display:grid;grid-template-columns:86px 1fr 90px;gap:8px;align-items:center;font-size:13px}.bar-bg{height:12px;border-radius:999px;background:#eee8df;overflow:hidden}.bar{height:100%;background:var(--danger);border-radius:999px;min-width:3px}.empty{color:var(--muted);font-size:13px;text-align:center;padding:18px 8px;border:1px dashed var(--line);border-radius:14px;background:#fbfaf8}.muted{color:var(--muted);font-size:12px}.hide{display:none!important}
    .screen{display:none}.screen.active{display:block}.bottom-nav{position:fixed;left:50%;bottom:0;transform:translateX(-50%);width:min(100%,980px);z-index:50;display:grid;grid-template-columns:repeat(5,1fr);gap:6px;padding:8px 10px calc(8px + env(safe-area-inset-bottom));background:rgba(246,243,238,.94);backdrop-filter:blur(14px);border-top:1px solid var(--line)}.nav-btn{min-height:48px;padding:6px 4px;border-radius:15px;background:transparent;color:var(--muted);border:1px solid transparent;font-size:11px;font-weight:750;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px}.nav-btn .ico{font-size:18px;line-height:1}.nav-btn.active{background:#fff;color:var(--accent);border-color:var(--line);box-shadow:0 5px 18px rgba(30,24,18,.08)}@media (min-width:820px){.screen.active .grid{grid-template-columns:1fr 1fr}.screen.active .grid.one{grid-template-columns:1fr}}
    dialog{border:0;border-radius:22px;padding:0;width:min(92vw,460px);box-shadow:0 18px 60px rgba(0,0,0,.24)} dialog::backdrop{background:rgba(0,0,0,.26)}.modal{padding:16px;background:#fff;border-radius:22px}.modal h3{margin:0 0 10px;font-size:17px}.toast{position:fixed;left:50%;bottom:86px;transform:translateX(-50%) translateY(30px);background:#222;color:#fff;border-radius:999px;padding:10px 14px;opacity:0;transition:.25s;z-index:80;font-size:13px;pointer-events:none}.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  </style>
</head>
<body>
<header><div class="top"><h1>出納帳</h1><span class="pill" id="savedState">自動保存</span></div></header>
<main>
  <section class="screen active" id="screen-home"><div class="grid"><section class="card wide"><h2>全体</h2><div class="filters"><select id="homePeriodType" onchange="onHomePeriodTypeChange()"><option value="month">月ごと</option><option value="year">今年</option><option value="all">全期間</option></select><input id="homeMonthPicker" type="month" onchange="render()" /></div><div class="summary"><div class="metric"><div class="label">現在の合計残高</div><div class="value" id="totalBalance">¥0</div></div><div class="metric"><div class="label">選択期間の支出</div><div class="value minus" id="monthExpense">¥0</div></div><div class="metric"><div class="label">選択期間の収入</div><div class="value plus" id="monthIncome">¥0</div></div><div class="metric"><div class="label">選択期間の差引</div><div class="value" id="monthNet">¥0</div></div></div></section></div></section>
  <section class="screen" id="screen-record"><div class="grid"><section class="card"><h2>入出金を記録</h2><div class="tabs"><button class="tab active" id="tabExpense" onclick="setTxType('expense')">使った</button><button class="tab" id="tabIncome" onclick="setTxType('income')">受け取った</button></div><label>媒体をタップ</label><div class="quick-grid" id="quickMedia"></div><div class="row"><div><label>金額</label><input id="txAmount" inputmode="numeric" placeholder="例: 1200" /></div><div><label>日付</label><input id="txDate" type="date" /></div></div><div class="row"><div><label>ジャンル</label><select id="txGenre"></select></div><div><label>メモ・用途</label><input id="txMemo" placeholder="例: 昼食、交通費、仕送り" /></div></div><div class="actions"><button onclick="addTransaction()">記録する</button><button class="secondary" onclick="clearTxForm()">入力を消す</button></div></section><section class="card"><h2>媒体間の移動</h2><p class="muted">例: 銀行から現金へ1,000円下ろす、現金からSuicaへチャージする。</p><div class="row"><div><label>移動元</label><select id="fromMedium"></select></div><div><label>移動先</label><select id="toMedium"></select></div></div><div class="row"><div><label>金額</label><input id="transferAmount" inputmode="numeric" placeholder="例: 1000" /></div><div><label>日付</label><input id="transferDate" type="date" /></div></div><label>メモ</label><input id="transferMemo" placeholder="例: Suicaチャージ" /><div class="actions"><button class="green" onclick="addTransfer()">移動を記録</button></div></section></div></section>
  <section class="screen" id="screen-monthly"><div class="grid one"><section class="card"><h2>月別の支出</h2><div class="filters"><input id="monthPicker" type="month" onchange="render()" /><select id="chartMode" onchange="render()"><option value="genre">ジャンル別</option><option value="medium">媒体別</option><option value="memo">メモ別</option></select></div><div class="bar-wrap" id="monthlyBars"></div></section></div></section>
  <section class="screen" id="screen-history"><div class="grid one"><section class="card"><h2>履歴 <span class="muted" id="historyCount"></span></h2><div class="filters"><select id="historyPeriodType" onchange="renderHistoryPeriodControls();render()"><option value="month">月ごと</option><option value="range">日付範囲</option><option value="all">全期間</option></select><select id="historyType" onchange="renderHistoryFilterControls();render()"><option value="all">すべて</option><option value="expense">支出</option><option value="income">収入</option><option value="transfer">移動</option></select></div><div class="filters" id="historyMonthControls"><input id="historyMonth" type="month" onchange="render()" /><button class="secondary small" onclick="setHistoryMonthOffset(-1)">前月</button></div><div class="filters hide" id="historyRangeControls"><input id="historyStartDate" type="date" onchange="render()" /><input id="historyEndDate" type="date" onchange="render()" /></div><div class="filters" id="historyExtraFilters"><select id="historyGenre" onchange="render()"></select><select id="historyMedium" onchange="render()"></select></div><div class="history" id="history"></div></section></div></section>
  <section class="screen" id="screen-settings"><div class="grid one"><section class="card"><h2>媒体 <button class="small" onclick="openMediumModal()">追加</button></h2><p class="muted">媒体の追加・編集・削除ができます。</p><div class="medium-list" id="settingsMediumList"></div></section><section class="card"><h2>ジャンル <button class="small" onclick="openGenreModal()">追加</button></h2><p class="muted">入力時に選ぶジャンルを追加・編集・削除できます。</p><div class="medium-list" id="genreList"></div></section><section class="card"><h2>データ</h2><p class="muted">入力内容はこの端末のブラウザ内に保存されます。今後の更新版でも同じ保存場所を使います。別端末へ移す場合や念のためのバックアップにはエクスポートを使ってください。</p><div class="actions"><button class="secondary" onclick="exportData()">エクスポート</button><button class="secondary" onclick="document.getElementById('importFile').click()">インポート</button><button class="danger" onclick="resetAll()">全削除</button></div><input id="importFile" class="hide" type="file" accept="application/json" onchange="importData(event)" /></section></div></section>
</main>
<nav class="bottom-nav" aria-label="画面切り替え"><button class="nav-btn active" id="nav-home" onclick="showScreen('home')"><span class="ico">🏠</span><span>ホーム</span></button><button class="nav-btn" id="nav-record" onclick="showScreen('record')"><span class="ico">✍️</span><span>記録</span></button><button class="nav-btn" id="nav-monthly" onclick="showScreen('monthly')"><span class="ico">📊</span><span>月別</span></button><button class="nav-btn" id="nav-history" onclick="showScreen('history')"><span class="ico">📋</span><span>履歴</span></button><button class="nav-btn" id="nav-settings" onclick="showScreen('settings')"><span class="ico">⚙️</span><span>設定</span></button></nav>

<dialog id="mediumDialog"><div class="modal"><h3 id="mediumDialogTitle">媒体を追加</h3><input type="hidden" id="mediumEditId" /><label>名前</label><input id="mediumName" placeholder="例: 現金、PayPay、銀行、Suica" /><label>現在入っている金額</label><input id="mediumBalance" inputmode="numeric" placeholder="例: 5000" /><label>色</label><input id="mediumColor" type="color" value="#4f7cff" /><div class="actions"><button onclick="saveMedium()">保存</button><button class="secondary" onclick="closeMediumModal()">閉じる</button></div></div></dialog>
<dialog id="genreDialog"><div class="modal"><h3 id="genreDialogTitle">ジャンルを追加</h3><input type="hidden" id="genreEditId" /><label>名前</label><input id="genreName" placeholder="例: 食費、交通、娯楽" /><label>色</label><input id="genreColor" type="color" value="#7b61ff" /><div class="actions"><button onclick="saveGenre()">保存</button><button class="secondary" onclick="closeGenreModal()">閉じる</button></div></div></dialog>
<dialog id="editTxDialog"><div class="modal"><h3>履歴を編集</h3><input type="hidden" id="editTxId" /><div id="editNormalFields"><div class="tabs"><button class="tab active" id="editTabExpense" onclick="setEditTxType('expense')">支出</button><button class="tab" id="editTabIncome" onclick="setEditTxType('income')">収入</button></div><label>媒体</label><select id="editTxMedium"></select><div class="row"><div><label>金額</label><input id="editTxAmount" inputmode="numeric" /></div><div><label>日付</label><input id="editTxDate" type="date" /></div></div><label>ジャンル</label><select id="editTxGenre"></select></div><div id="editTransferFields" class="hide"><div class="row"><div><label>移動元</label><select id="editFromMedium"></select></div><div><label>移動先</label><select id="editToMedium"></select></div></div><div class="row"><div><label>金額</label><input id="editTransferAmount" inputmode="numeric" /></div><div><label>日付</label><input id="editTransferDate" type="date" /></div></div></div><label>メモ</label><input id="editTxMemo" /><div class="actions"><button onclick="saveEditedTransaction()">保存</button><button class="secondary" onclick="closeEditTxModal()">閉じる</button></div></div></dialog>
<div class="toast" id="toast"></div>
<script>
const STORAGE_KEY="cashbook_app"; const yen=n=>"¥"+Math.round(Number(n||0)).toLocaleString("ja-JP"); const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,8); const today=()=>new Date().toISOString().slice(0,10); const ym=d=>(d||today()).slice(0,7);
const defaultGenres=()=>[{id:uid(),name:"食費",color:"#e85a5a"},{id:uid(),name:"交通",color:"#36a852"},{id:uid(),name:"日用品",color:"#a66a00"},{id:uid(),name:"娯楽",color:"#7b61ff"}];
let state={media:[{id:uid(),name:"現金",balance:0,color:"#4f7cff"},{id:uid(),name:"PayPay",balance:0,color:"#e85a5a"},{id:uid(),name:"銀行",balance:0,color:"#2f6f55"},{id:uid(),name:"Suica",balance:0,color:"#36a852"}],genres:defaultGenres(),transactions:[]}; let txType="expense"; let editTxType="expense"; let selectedMediumId=null;
function load(){const keys=[STORAGE_KEY,"cashbook_app_v7","cashbook_app_v6","cashbook_app_v5","cashbook_app_v4","cashbook_app_v3","cashbook_app_v2","cashbook_app_v1"];let loaded=false;for(const key of keys){const raw=localStorage.getItem(key);if(!raw)continue;try{const parsed=JSON.parse(raw);if(parsed&&Array.isArray(parsed.media)&&Array.isArray(parsed.transactions)){state=parsed;if(!Array.isArray(state.genres))state.genres=defaultGenres();loaded=true;localStorage.setItem(STORAGE_KEY,JSON.stringify(state));break}}catch(e){}}if(!loaded)localStorage.setItem(STORAGE_KEY,JSON.stringify(state)); if(!selectedMediumId&&state.media[0])selectedMediumId=state.media[0].id; const m=ym(today()); ensureDefaultDates(); document.getElementById("monthPicker").value=m; document.getElementById("historyMonth").value=m;const hs=document.getElementById("historyStartDate"),he=document.getElementById("historyEndDate");if(hs&&!hs.value)hs.value=today();if(he&&!he.value)he.value=today(); const hp=document.getElementById("homeMonthPicker"); if(hp&&!hp.value)hp.value=m; render()}
function save(){localStorage.setItem(STORAGE_KEY,JSON.stringify(state)); const el=document.getElementById("savedState"); el.textContent="保存済み"; setTimeout(()=>el.textContent="自動保存",900)}
function toast(msg){const el=document.getElementById("toast");el.textContent=msg;el.classList.add("show");setTimeout(()=>el.classList.remove("show"),1600)} function normalizeAmount(v){const n=Number(String(v).replace(/[^\d.-]/g,""));return Number.isFinite(n)?Math.round(n):0} function getMedium(id){return state.media.find(m=>m.id===id)} function getGenre(id){return (state.genres||[]).find(g=>g.id===id)}
function ensureDefaultDates(){["txDate","transferDate"].forEach(id=>{const el=document.getElementById(id);if(el&&!el.value)el.value=today()})} function setTxType(type){txType=type;document.getElementById("tabExpense").classList.toggle("active",type==="expense");document.getElementById("tabIncome").classList.toggle("active",type==="income")}
function showScreen(name){["home","record","monthly","history","settings"].forEach(key=>{document.getElementById("screen-"+key)?.classList.toggle("active",key===name);document.getElementById("nav-"+key)?.classList.toggle("active",key===name)});localStorage.setItem("cashbook_app_screen",name);window.scrollTo({top:0,behavior:"smooth"});ensureDefaultDates();render()}
function getHomePeriod(){const type=document.getElementById("homePeriodType")?.value||"month";const month=document.getElementById("homeMonthPicker")?.value||ym(today());const year=today().slice(0,4);return{type,month,year}} function inHomePeriod(date,p){if(!date)return false;if(p.type==="all")return true;if(p.type==="year")return date.slice(0,4)===p.year;return ym(date)===p.month} function onHomePeriodTypeChange(){const t=document.getElementById("homePeriodType").value;const p=document.getElementById("homeMonthPicker");if(p)p.style.display=t==="month"?"":"none";render()}
function render(){renderSummary();renderMedia();renderForms();renderGenres();renderHistoryPeriodControls();renderHistoryFilterControls();renderMonthlyBars();renderHistory()}
function renderSummary(){const total=state.media.reduce((s,m)=>s+Number(m.balance||0),0);const p=getHomePeriod();const tx=state.transactions.filter(t=>inHomePeriod(t.date,p));const exp=tx.filter(t=>t.type==="expense").reduce((s,t)=>s+t.amount,0);const inc=tx.filter(t=>t.type==="income").reduce((s,t)=>s+t.amount,0);const net=inc-exp;document.getElementById("totalBalance").textContent=yen(total);document.getElementById("monthExpense").textContent=yen(exp);document.getElementById("monthIncome").textContent=yen(inc);document.getElementById("monthNet").textContent=yen(net);document.getElementById("monthNet").className="value "+(net<0?"minus":net>0?"plus":"")}
function openMediumModal(m){document.getElementById("mediumDialogTitle").textContent=m?"媒体を編集":"媒体を追加";document.getElementById("mediumEditId").value=m?m.id:"";document.getElementById("mediumName").value=m?m.name:"";document.getElementById("mediumBalance").value=m?m.balance:"";document.getElementById("mediumColor").value=m?m.color:"#4f7cff";document.getElementById("mediumDialog").showModal()} function closeMediumModal(){document.getElementById("mediumDialog").close()} function saveMedium(){const id=document.getElementById("mediumEditId").value;const name=document.getElementById("mediumName").value.trim();const balance=normalizeAmount(document.getElementById("mediumBalance").value);const color=document.getElementById("mediumColor").value;if(!name){toast("名前を入力してください");return} if(id){const m=getMedium(id);if(m){m.name=name;m.balance=balance;m.color=color}}else{const m={id:uid(),name,balance,color};state.media.push(m);selectedMediumId=m.id} save();closeMediumModal();render();toast("媒体を保存しました")}
function deleteMedium(id){const used=state.transactions.some(t=>t.mediumId===id||t.fromId===id||t.toId===id);if(!confirm(used?"この媒体を削除すると、関連する履歴の媒体名は「削除済み」表示になります。削除しますか？":"この媒体を削除しますか？"))return;state.media=state.media.filter(m=>m.id!==id);if(selectedMediumId===id)selectedMediumId=state.media[0]?.id||null;save();render()}
function mediumListHtml(){if(state.media.length===0)return`<div class="empty">媒体がありません。まず「追加」から作成してください。</div>`;return state.media.map(m=>`<div class="medium-item"><div class="medium-left"><span class="dot" style="background:${m.color}"></span><div><div class="name">${escapeHtml(m.name)}</div><div class="sub">現在残高</div></div></div><div style="text-align:right"><div class="yen">${yen(m.balance)}</div><div class="actions" style="justify-content:flex-end;margin-top:6px"><button class="small secondary" onclick='openMediumModal(${JSON.stringify(m)})'>編集</button><button class="small ghost" onclick="deleteMedium('${m.id}')">削除</button></div></div></div>`).join("")} function renderMedia(){const el=document.getElementById("settingsMediumList");if(el)el.innerHTML=mediumListHtml()}
function renderForms(){const quick=document.getElementById("quickMedia");if(state.media.length===0){quick.innerHTML=`<div class="empty" style="grid-column:1/-1">媒体を追加してください。</div>`}else{if(!getMedium(selectedMediumId))selectedMediumId=state.media[0].id;quick.innerHTML=state.media.map(m=>`<button class="quick ${m.id===selectedMediumId?"selected":""}" onclick="selectMedium('${m.id}')"><div class="qname"><span class="dot" style="display:inline-block;vertical-align:middle;background:${m.color}"></span> ${escapeHtml(m.name)}</div><div class="qbal">${yen(m.balance)}</div></button>`).join("")} renderGenreSelect("txGenre");fillMediumSelect("fromMedium",document.getElementById("fromMedium")?.value);fillMediumSelect("toMedium",document.getElementById("toMedium")?.value);const from=document.getElementById("fromMedium"),to=document.getElementById("toMedium");if(from&&to&&from.value===to.value&&state.media[1])to.value=state.media[1].id}
function selectMedium(id){selectedMediumId=id;renderForms()}
function renderGenreSelect(id,selected=""){const el=document.getElementById(id);if(!el)return;const old=selected||el.value;el.innerHTML=`<option value="">未分類</option>`+(state.genres||[]).map(g=>`<option value="${g.id}">${escapeHtml(g.name)}</option>`).join("");if([...el.options].some(o=>o.value===old))el.value=old} function fillMediumSelect(id,selected=""){const el=document.getElementById(id);if(!el)return;el.innerHTML=state.media.map(m=>`<option value="${m.id}">${escapeHtml(m.name)} ${yen(m.balance)}</option>`).join("");if([...el.options].some(o=>o.value===selected))el.value=selected}
function addTransaction(){const amount=normalizeAmount(document.getElementById("txAmount").value);const date=document.getElementById("txDate").value||today();const memo=document.getElementById("txMemo").value.trim();const genreId=document.getElementById("txGenre").value||"";const m=getMedium(selectedMediumId);if(!m){toast("媒体を選んでください");return} if(amount<=0){toast("金額を入力してください");return} const delta=txType==="expense"?-amount:amount;m.balance+=delta;state.transactions.push({id:uid(),type:txType,mediumId:m.id,genreId,amount,date,memo,createdAt:new Date().toISOString()});save();clearTxForm(false);render();toast("記録しました")}
function clearTxForm(clearDate=true){document.getElementById("txAmount").value="";document.getElementById("txMemo").value="";if(clearDate)document.getElementById("txDate").value=today();ensureDefaultDates()}
function addTransfer(){const fromId=document.getElementById("fromMedium").value,toId=document.getElementById("toMedium").value,amount=normalizeAmount(document.getElementById("transferAmount").value),date=document.getElementById("transferDate").value||today(),memo=document.getElementById("transferMemo").value.trim();if(!fromId||!toId){toast("移動元と移動先を選んでください");return} if(fromId===toId){toast("同じ媒体には移動できません");return} if(amount<=0){toast("金額を入力してください");return} const f=getMedium(fromId),t=getMedium(toId);if(!f||!t){toast("媒体が見つかりません");return} f.balance-=amount;t.balance+=amount;state.transactions.push({id:uid(),type:"transfer",fromId,toId,amount,date,memo,createdAt:new Date().toISOString()});document.getElementById("transferAmount").value="";document.getElementById("transferMemo").value="";save();render();toast("移動を記録しました")}
function openGenreModal(g){document.getElementById("genreDialogTitle").textContent=g?"ジャンルを編集":"ジャンルを追加";document.getElementById("genreEditId").value=g?g.id:"";document.getElementById("genreName").value=g?g.name:"";document.getElementById("genreColor").value=g?g.color:"#7b61ff";document.getElementById("genreDialog").showModal()} function closeGenreModal(){document.getElementById("genreDialog").close()} function saveGenre(){const id=document.getElementById("genreEditId").value,name=document.getElementById("genreName").value.trim(),color=document.getElementById("genreColor").value;if(!name){toast("ジャンル名を入力してください");return} if(id){const g=getGenre(id);if(g){g.name=name;g.color=color}}else{state.genres.push({id:uid(),name,color})} save();closeGenreModal();render();toast("ジャンルを保存しました")} function deleteGenre(id){const used=state.transactions.some(t=>t.genreId===id);if(!confirm(used?"このジャンルを削除すると、関連する履歴は未分類になります。削除しますか？":"このジャンルを削除しますか？"))return;state.genres=state.genres.filter(g=>g.id!==id);state.transactions.forEach(t=>{if(t.genreId===id)t.genreId=""});save();render();toast("ジャンルを削除しました")} function renderGenres(){const box=document.getElementById("genreList");if(!box)return;if(!state.genres.length){box.innerHTML=`<div class="empty">ジャンルがありません。「追加」から作成してください。</div>`;return} box.innerHTML=state.genres.map(g=>`<div class="medium-item"><div class="medium-left"><span class="dot" style="background:${g.color}"></span><div><div class="name">${escapeHtml(g.name)}</div><div class="sub">入力時に選択できます</div></div></div><div class="actions" style="justify-content:flex-end;margin-top:0"><button class="small secondary" onclick='openGenreModal(${JSON.stringify(g)})'>編集</button><button class="small ghost" onclick="deleteGenre('${g.id}')">削除</button></div></div>`).join("")}
function renderMonthlyBars(){const month=document.getElementById("monthPicker").value||ym(today()),mode=document.getElementById("chartMode").value;const expenses=state.transactions.filter(t=>t.type==="expense"&&ym(t.date)===month);const map=new Map();expenses.forEach(t=>{let key="未分類";if(mode==="medium")key=getMedium(t.mediumId)?.name||"削除済み";else if(mode==="genre")key=getGenre(t.genreId)?.name||"未分類";else key=t.memo||"メモなし";map.set(key,(map.get(key)||0)+t.amount)});const items=[...map.entries()].sort((a,b)=>b[1]-a[1]);const total=items.reduce((s,x)=>s+x[1],0),max=Math.max(...items.map(x=>x[1]),1);const box=document.getElementById("monthlyBars");if(items.length===0){box.innerHTML=`<div class="empty">この月の支出はまだありません。</div>`;return} box.innerHTML=items.map(([name,amount])=>`<div class="bar-row"><div class="sub" title="${escapeAttr(name)}">${escapeHtml(shorten(name,8))}</div><div class="bar-bg"><div class="bar" style="width:${Math.max(3,amount/max*100)}%"></div></div><div style="text-align:right;font-weight:800">${yen(amount)}</div></div>`).join("")+`<div class="muted" style="text-align:right;margin-top:4px">合計 ${yen(total)}</div>`}
function renderHistory(){const type=document.getElementById("historyType").value,genreFilter=document.getElementById("historyGenre")?.value||"all",mediumFilter=document.getElementById("historyMedium")?.value||"all",period=getHistoryPeriod();let list=state.transactions.filter(t=>inHistoryPeriod(t.date,period));if(type!=="all")list=list.filter(t=>t.type===type);if(genreFilter!=="all"){list=list.filter(t=>{if(t.type==="transfer")return false;if(genreFilter==="__none__")return !t.genreId;return t.genreId===genreFilter})}if(mediumFilter!=="all"){list=list.filter(t=>{if(t.type==="transfer"){if(mediumFilter==="__deleted__")return !getMedium(t.fromId)||!getMedium(t.toId);return t.fromId===mediumFilter||t.toId===mediumFilter}if(mediumFilter==="__deleted__")return !getMedium(t.mediumId);return t.mediumId===mediumFilter})}list.sort((a,b)=>(b.date+b.createdAt).localeCompare(a.date+a.createdAt));document.getElementById("historyCount").textContent=`${list.length}件`;const box=document.getElementById("history");if(list.length===0){box.innerHTML=`<div class="empty">条件に合う履歴がありません。</div>`;return}box.innerHTML=list.map(txHtml).join("")}
function getHistoryPeriod(){const type=document.getElementById("historyPeriodType")?.value||"month";return{type,month:document.getElementById("historyMonth")?.value||ym(today()),start:document.getElementById("historyStartDate")?.value||"",end:document.getElementById("historyEndDate")?.value||""}}
function inHistoryPeriod(date,period){if(!date)return false;if(period.type==="all")return true;if(period.type==="range"){const s=period.start||"0000-01-01",e=period.end||"9999-12-31";return date>=s&&date<=e}return ym(date)===period.month}
function renderHistoryPeriodControls(){const type=document.getElementById("historyPeriodType")?.value||"month",monthBox=document.getElementById("historyMonthControls"),rangeBox=document.getElementById("historyRangeControls");if(monthBox)monthBox.classList.toggle("hide",type!=="month");if(rangeBox)rangeBox.classList.toggle("hide",type!=="range")}
function setHistoryMonthOffset(delta){const el=document.getElementById("historyMonth");if(!el)return;const base=el.value?new Date(el.value+"-01"):new Date();base.setMonth(base.getMonth()+delta);el.value=base.toISOString().slice(0,7);render()}
function renderHistoryFilterControls(){renderHistoryGenreFilter();renderHistoryMediumFilter();const type=document.getElementById("historyType")?.value||"all",genre=document.getElementById("historyGenre");if(genre){genre.disabled=type==="transfer";if(type==="transfer")genre.value="all"}}
function renderHistoryGenreFilter(){const el=document.getElementById("historyGenre");if(!el)return;const old=el.value||"all";const options=[`<option value="all">ジャンル: すべて</option>`,`<option value="__none__">ジャンル: 未分類</option>`].concat((state.genres||[]).map(g=>`<option value="${g.id}">ジャンル: ${escapeHtml(g.name)}</option>`));el.innerHTML=options.join("");if([...el.options].some(o=>o.value===old))el.value=old;else el.value="all"}
function renderHistoryMediumFilter(){const el=document.getElementById("historyMedium");if(!el)return;const old=el.value||"all";const options=[`<option value="all">媒体: すべて</option>`,`<option value="__deleted__">媒体: 削除済み</option>`].concat((state.media||[]).map(m=>`<option value="${m.id}">媒体: ${escapeHtml(m.name)}</option>`));el.innerHTML=options.join("");if([...el.options].some(o=>o.value===old))el.value=old;else el.value="all"}
function txHtml(t){if(t.type==="expense"||t.type==="income"){const m=getMedium(t.mediumId),label=t.type==="expense"?"支出":"収入",sign=t.type==="expense"?"-":"+",genre=getGenre(t.genreId)?.name||"未分類";return`<div class="tx"><div class="tx-top"><div><div class="tx-title">${escapeHtml(t.memo||label)}</div><div class="tx-meta">${t.date}・${escapeHtml(m?.name||"削除済み")}・${label}・${escapeHtml(genre)}</div></div><div class="tx-amount ${t.type}">${sign}${yen(t.amount)}</div></div><div class="actions" style="margin-top:0"><button class="small secondary" onclick="openEditTxModal('${t.id}')">編集</button><button class="small ghost" onclick="deleteTx('${t.id}')">削除</button></div></div>`} const f=getMedium(t.fromId),to=getMedium(t.toId);return`<div class="tx"><div class="tx-top"><div><div class="tx-title">${escapeHtml(t.memo||"媒体間の移動")}</div><div class="tx-meta">${t.date}・${escapeHtml(f?.name||"削除済み")} → ${escapeHtml(to?.name||"削除済み")}</div></div><div class="tx-amount transfer">${yen(t.amount)}</div></div><div class="actions" style="margin-top:0"><button class="small secondary" onclick="openEditTxModal('${t.id}')">編集</button><button class="small ghost" onclick="deleteTx('${t.id}')">削除</button></div></div>`}
function reverseEffect(t){if(t.type==="expense"||t.type==="income"){const m=getMedium(t.mediumId);if(m)m.balance-=(t.type==="expense"?-t.amount:t.amount)}else{const f=getMedium(t.fromId),to=getMedium(t.toId);if(f)f.balance+=t.amount;if(to)to.balance-=t.amount}} function applyEffect(t){if(t.type==="expense"||t.type==="income"){const m=getMedium(t.mediumId);if(m)m.balance+=(t.type==="expense"?-t.amount:t.amount)}else{const f=getMedium(t.fromId),to=getMedium(t.toId);if(f)f.balance-=t.amount;if(to)to.balance+=t.amount}}
function deleteTx(id){const t=state.transactions.find(x=>x.id===id);if(!t)return;if(!confirm("この履歴を削除して残高を元に戻しますか？"))return;reverseEffect(t);state.transactions=state.transactions.filter(x=>x.id!==id);save();render();toast("削除しました")}
function setEditTxType(type){editTxType=type;document.getElementById("editTabExpense").classList.toggle("active",type==="expense");document.getElementById("editTabIncome").classList.toggle("active",type==="income")} function openEditTxModal(id){const t=state.transactions.find(x=>x.id===id);if(!t)return;document.getElementById("editTxId").value=id;document.getElementById("editTxMemo").value=t.memo||"";const normal=document.getElementById("editNormalFields"),transfer=document.getElementById("editTransferFields");if(t.type==="transfer"){normal.classList.add("hide");transfer.classList.remove("hide");fillMediumSelect("editFromMedium",t.fromId);fillMediumSelect("editToMedium",t.toId);document.getElementById("editTransferAmount").value=t.amount;document.getElementById("editTransferDate").value=t.date||today()}else{normal.classList.remove("hide");transfer.classList.add("hide");setEditTxType(t.type||"expense");fillMediumSelect("editTxMedium",t.mediumId);renderGenreSelect("editTxGenre",t.genreId||"");document.getElementById("editTxAmount").value=t.amount;document.getElementById("editTxDate").value=t.date||today()}document.getElementById("editTxDialog").showModal()} function closeEditTxModal(){document.getElementById("editTxDialog").close()}
function saveEditedTransaction(){const id=document.getElementById("editTxId").value,t=state.transactions.find(x=>x.id===id);if(!t)return;reverseEffect(t);if(t.type==="transfer"){const fromId=document.getElementById("editFromMedium").value,toId=document.getElementById("editToMedium").value,amount=normalizeAmount(document.getElementById("editTransferAmount").value),date=document.getElementById("editTransferDate").value||today(),memo=document.getElementById("editTxMemo").value.trim();if(!fromId||!toId||fromId===toId||amount<=0){toast("入力内容を確認してください");applyEffect(t);return}Object.assign(t,{fromId,toId,amount,date,memo})}else{const mediumId=document.getElementById("editTxMedium").value,amount=normalizeAmount(document.getElementById("editTxAmount").value),date=document.getElementById("editTxDate").value||today(),memo=document.getElementById("editTxMemo").value.trim(),genreId=document.getElementById("editTxGenre").value||"";if(!mediumId||amount<=0){toast("入力内容を確認してください");applyEffect(t);return}Object.assign(t,{type:editTxType,mediumId,amount,date,memo,genreId})}applyEffect(t);save();closeEditTxModal();render();toast("履歴を編集しました")}
function exportData(){const blob=new Blob([JSON.stringify(state,null,2)],{type:"application/json"});const url=URL.createObjectURL(blob);const a=document.createElement("a");a.href=url;a.download="cashbook-data.json";a.click();URL.revokeObjectURL(url)} function importData(e){const file=e.target.files[0];if(!file)return;const r=new FileReader();r.onload=()=>{try{const data=JSON.parse(r.result);if(!Array.isArray(data.media)||!Array.isArray(data.transactions))throw new Error("bad");state=data;if(!Array.isArray(state.genres))state.genres=defaultGenres();selectedMediumId=state.media[0]?.id||null;save();render();toast("インポートしました")}catch(err){toast("読み込めないファイルです")}};r.readAsText(file);e.target.value=""} function resetAll(){if(!confirm("すべての媒体・ジャンル・履歴を削除しますか？"))return;localStorage.removeItem(STORAGE_KEY);state={media:[],genres:[],transactions:[]};selectedMediumId=null;render();toast("削除しました")}
function escapeHtml(s){return String(s??"").replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))} function escapeAttr(s){return escapeHtml(s).replace(/"/g,"&quot;")} function shorten(s,n){s=String(s);return s.length>n?s.slice(0,n)+"…":s}
load();onHomePeriodTypeChange();renderHistoryPeriodControls();renderHistoryFilterControls();showScreen(localStorage.getItem("cashbook_app_screen")||"home");document.addEventListener("focusin",e=>{if(e.target&&(e.target.id==="txDate"||e.target.id==="transferDate")&&!e.target.value)e.target.value=today()}); if("serviceWorker" in navigator&&location.protocol!=="file:"){navigator.serviceWorker.register("./service-worker.js").catch(()=>{})}
</script>
